<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Welcome Back, Student!</h1>
        <p>Login to access your classes, assignments and more.</p>

        <img src="image.jpg" alt="">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="login-box">
            <h2>Student Login</h2>

            <label>Email or Student ID</label>
            <input type="text" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <div class="forgot">Forgot Password?</div>

            <button>Login</button>

            <div class="or">OR</div>

            <button class="secondary">Login with School Account</button>

            <p class="bottom">New here? Contact your institution</p>
        </div>
    </div>

</div>

</body>
</html>
